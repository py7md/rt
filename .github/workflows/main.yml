name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # نستخدم 'any' لترك النظام يختار أحدث نسخة متوافقة مع مكتباتك
          flutter-version: 'any'

      - name: Install Dependencies
        # نقوم بتحديث المكتبات لضمان التوافق مع إصدار Flutter الحديث
        run: flutter pub upgrade --major-versions

      - name: Build APK
        # نستخدم --build-name و --build-number لضمان خروج ملف صحيح
        run: flutter build apk --release --split-per-abi

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: build/app/outputs/flutter-apk/*.apk
