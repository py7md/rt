name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # استخدام 'any' يسمح لـ GitHub باختيار أحدث نسخة متوافقة تلقائياً
          # وهذا يحل مشكلة تعارض الإصدارات التي رأيناها في image_2b143e.png
          flutter-version: 'any'

      - name: Install Dependencies
        # إضافة --no-pub يمنع محاولة حل الإصدارات المعقدة إذا كان الملف جاهزاً
        # أو استخدام التحديث المباشر لحل التعارض
        run: flutter pub upgrade --major-versions

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
